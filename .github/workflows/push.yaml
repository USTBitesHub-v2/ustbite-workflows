name: push

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      git_tag:
        required: true
        type: string
      tag_exists:
        required: true
        type: string
      aws_region:
        required: false
        type: string
        default: us-east-1
    secrets:
      AWS_ACCOUNT_ID:
        required: true
      ECR_ROLE_ARN:
        required: true

    outputs:
      push_result:
        description: "push job result"
        value: ${{ jobs.push.outputs.result }}
      tag:
        description: "The image tag that was pushed"
        value: ${{ jobs.push.outputs.tag }}


jobs:
  push:
    name: push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    outputs:
      result: ${{ job.status }}
      tag:    ${{ inputs.git_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.service_name }}
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/image.tar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image name
        run: |
          echo "IMAGE_NAME=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com/ustbite/${{ inputs.service_name }}" >> $GITHUB_ENV

      - name: Tag and push versioned image
        run: |
          IMAGE_TAG="${{ env.IMAGE_NAME }}:${{ inputs.git_tag }}"
          LOADED_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | head -n1)
          docker tag "$LOADED_IMAGE" "$IMAGE_TAG"
          docker push "$IMAGE_TAG"

      - name: Tag and push latest (main only)
        if: github.ref_name == 'main'
        run: |
          IMAGE_TAG="${{ env.IMAGE_NAME }}:${{ inputs.git_tag }}"
          IMAGE_LATEST="${{ env.IMAGE_NAME }}:latest"
          docker tag "$IMAGE_TAG" "$IMAGE_LATEST"
          docker push "$IMAGE_LATEST"

      - name: Create and push git tag (main only, if not exists)
        if: github.ref_name == 'main' && inputs.tag_exists != 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag ${{ inputs.git_tag }}
          git push origin ${{ inputs.git_tag }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (main only)
        if: github.ref_name == 'main'
        run: |
          IMAGE="${{ env.IMAGE_NAME }}:${{ inputs.git_tag }}"
          cosign sign --yes "$IMAGE"
        env:
          COSIGN_EXPERIMENTAL: "1"
