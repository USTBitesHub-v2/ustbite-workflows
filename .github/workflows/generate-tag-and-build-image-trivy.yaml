name: generate-tag-and-build-image

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      run_trivy:
        description: "Run Trivy image scan (set false on push/merge since it ran in the PR)"
        type: boolean
        default: true
      aws_region:
        required: false
        type: string
        default: us-east-1
    secrets:
      AWS_ACCOUNT_ID:
        required: true
      ECR_ROLE_ARN:
        required: true

    outputs:
      tag:
        description: "Computed image tag"
        value: ${{ jobs.generate-tag.outputs.tag }}
      tag_exists:
        description: "Whether git tag already exists"
        value: ${{ jobs.generate-tag.outputs.tag_exists }}
      image_exists:
        description: "Whether ECR image already exists"
        value: ${{ jobs.generate-tag.outputs.image_exists }}
      build_result:
        description: "build-image job result"
        value: ${{ jobs.build-image.outputs.result }}
      trivy_result:
        description: "trivy job result"
        value: ${{ jobs.trivy.outputs.result }}


jobs:
  generate-tag:
    name: generate tag
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      tag:          ${{ steps.tag.outputs.tag }}
      tag_exists:   ${{ steps.tag_check.outputs.exists }}
      image_exists: ${{ steps.image_check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version (main only)
        id: semver
        if: github.ref_name == 'main'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          tag_prefix: "${{ inputs.service_name }}-v"
          dry_run: true
          default_bump: patch

      - name: Generate tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            COMPUTED_TAG="${{ steps.semver.outputs.new_tag }}"
            echo "Branch: main  |  semver new_tag: $COMPUTED_TAG"
            echo "tag=$COMPUTED_TAG" >> $GITHUB_OUTPUT
          else
            BRANCH_SLUG=$(echo "${{ github.ref_name }}" | sed 's|/|-|g')
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
            COMPUTED_TAG="${BRANCH_SLUG}-${SHORT_SHA}"
            echo "Branch: ${{ github.ref_name }}  |  tag: $COMPUTED_TAG"
            echo "tag=$COMPUTED_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Validate existing git tag
        id: tag_check
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          git fetch --tags origin || true

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_COMMIT=$(git rev-list -n 1 "$TAG")
            CURRENT_COMMIT=$(git rev-parse HEAD)

            if [ "$TAG_COMMIT" != "$CURRENT_COMMIT" ]; then
              echo "Tag $TAG already exists but points to a different commit — aborting."
              exit 1
            fi

            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Check if ECR image already exists
        id: image_check
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          REPO="ustbite/${{ inputs.service_name }}"
          echo "Checking ECR image: $REPO:$TAG"

          if aws ecr describe-images \
              --repository-name "$REPO" \
              --image-ids imageTag="$TAG" \
              --region "${{ inputs.aws_region }}" > /dev/null 2>&1; then
            echo "Image EXISTS in ECR — skipping build"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Image NOT found in ECR — will build and push"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi


  build-image:
    name: build image
    runs-on: ubuntu-latest
    needs: [generate-tag]
    if: |
      always() &&
      needs.generate-tag.result == 'success' &&
      needs.generate-tag.outputs.image_exists != 'true'
    permissions:
      id-token: write
      contents: read
    outputs:
      result: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Set image name
        run: |
          echo "IMAGE_NAME=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com/ustbite/${{ inputs.service_name }}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ needs.generate-tag.outputs.tag }} ${{ inputs.service_path }}

      - name: Save Docker image to tar
        run: docker save ${{ env.IMAGE_NAME }}:${{ needs.generate-tag.outputs.tag }} -o /tmp/image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ inputs.service_name }}
          path: /tmp/image.tar
          retention-days: 1


  trivy:
    name: trivy
    runs-on: ubuntu-latest
    if: |
      always() &&
      inputs.run_trivy == true &&
      needs.build-image.result == 'success'
    needs: [generate-tag, build-image]
    permissions:
      id-token: write
      contents: read
    outputs:
      result: ${{ steps.trivy.outcome }}
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.service_name }}
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/image.tar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Set image name
        run: |
          echo "IMAGE_NAME=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com/ustbite/${{ inputs.service_name }}" >> $GITHUB_ENV

      - name: Trivy scan
        id: trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ needs.generate-tag.outputs.tag }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Fail if trivy found critical vulnerabilities
        if: steps.trivy.outcome == 'failure'
        run: |
          echo "Trivy scan found critical vulnerabilities"
          exit 1
